name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: localdoc
          POSTGRES_USER: localdoc
          POSTGRES_PASSWORD: localdoc
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U localdoc -d localdoc"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:8-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint backend
        run: ruff check backend tests
      - name: Test backend
        env:
          DATABASE_URL: postgres://localdoc:localdoc@localhost:5432/localdoc
          REDIS_URL: redis://localhost:6379/0
          DJANGO_SECRET_KEY: ci-secret
        run: pytest -v

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install frontend dependencies
        run: npm --prefix frontend install
      - name: Lint frontend
        run: npm --prefix frontend run lint
      - name: Test frontend
        run: npm --prefix frontend run test
      - name: Build frontend
        run: npm --prefix frontend run build

  cpp-chunker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build C++ chunker
        run: make cpp-build
      - name: Test C++ chunker
        run: make cpp-test
